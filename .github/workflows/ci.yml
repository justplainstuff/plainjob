name: ci 🚀

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-bun:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        name: checkout code 📥
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - name: install dependencies 🔧
        run: bun install
      - name: build ✅
        run: bun run build
      - name: test ✅
        run: bun run test:bun
      - name: bench ✅
        run: bun run bench:bun

  check-better:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        name: checkout code 📥
      - name: setup node 🟢
        uses: actions/setup-node@v4
        with:
          node-version: "20.20.1"
      - name: install dependencies 🔧
        run: npm install
      - name: build ✅
        run: npm run build
      - name: run test ✅
        run: npm run test:better
      - name: run bench ✅
        run: npm run bench:better
